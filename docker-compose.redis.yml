# filepath: docker-compose.redis.yml
# Uso: make dev-with-redis
# NO incluir en docker-compose.yml base — Redis es opcional en desarrollo

services:
  redis:
    image: redis:7.4-alpine@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065  # fijar hash en producción
    container_name: nombre_del_proyecto_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_dev_password}
      --maxmemory 64mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --loglevel warning
    ports:
      - "127.0.0.1:6379:6379"   # Solo accesible desde el host, no desde internet
    networks:
      - nombre_del_proyecto-private
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_password}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    mem_limit: 128m
    cpus: "0.25"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # cap_add:
    #   - SETGID
    #   - SETUID
    read_only: true
    tmpfs:
      - /tmp:size=16m

networks:
  nombre_del_proyecto-private:
    external: true
    name: nombre_del_proyecto-private