  # ────────────────────────────────────────────────────────────────────────────
  # 4. TESTS + COBERTURA
  # ACTUALIZADO: añadidos coverage reports y threshold
  # ────────────────────────────────────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        working-directory: ./backend
        run: pnpm install --frozen-lockfile

      # ── pnpm audit — detecta vulnerabilidades en dependencias ────
      # --audit-level=high: falla solo en HIGH y CRITICAL
      # --prod: solo dependencias de producción (no devDependencies)
      - name: pnpm audit — dependencias de producción
        working-directory: ./backend
        run: |
          pnpm audit --audit-level=high --prod 2>&1 | tee /tmp/pnpm-audit-backend.txt || {
            echo "⚠️ Vulnerabilidades HIGH/CRITICAL encontradas en backend"
            echo "Ver artefacto pnpm-audit-backend para el detalle completo"
            exit 1
          }

      # ── Tests con cobertura ────────────────────────────────────────────────
      # pnpm run test:cov ejecuta: jest --coverage  (definido en package.json)
      # El threshold ya está en package.json → jest config
      # NO usar --coverageThreshold en CLI: anularía el valor de package.json.
      # --passWithNoTests: no falla si aún no hay tests escritos (plantilla inicial).
      #
      # Si el threshold falla: o hay tests rotos o la cobertura bajó de los mínimos.
      # En ambos casos el CI DEBE fallar — no silenciar con fallbacks.
      - name: Run tests with coverage
        working-directory: ./backend
        run: pnpm run test:cov -- --passWithNoTests

      - name: Run linter
        working-directory: ./backend
        run: pnpm run lint

      - name: Upload pnpm audit — backend
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pnpm-audit-backend-${{ github.sha }}
          path: /tmp/pnpm-audit-backend.txt
          retention-days: 30

      - name: Upload coverage report — backend
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-backend-${{ github.sha }}
          path: backend/coverage/
          retention-days: 30

  test-frontend:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      # ── pnpm audit — frontend ────────────────────────────────────
      - name: pnpm audit — dependencias de producción
        working-directory: ./frontend
        run: |
          pnpm audit --audit-level=high --prod 2>&1 | tee /tmp/pnpm-audit-frontend.txt || {
            echo "⚠️ Vulnerabilidades HIGH/CRITICAL encontradas en frontend"
            exit 1
          }

      - name: Run linter
        working-directory: ./frontend
        run: pnpm run lint

      - name: Run tests with coverage
        working-directory: ./frontend
        run: pnpm test --if-present -- --coverage 2>/dev/null || echo "⚠️ Sin tests de frontend configurados"

      - name: Upload pnpm audit — frontend
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pnpm-audit-frontend-${{ github.sha }}
          path: /tmp/pnpm-audit-frontend.txt
          retention-days: 30

      - name: Upload coverage report — frontend
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-frontend-${{ github.sha }}
          path: frontend/coverage/
          retention-days: 30

  test-reports:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: ./reports
        run: pip install -r requirements.txt

      - name: Run linter (flake8)
        working-directory: ./reports
        run: |
          pip install -r requirements.txt
          flake8 . --max-line-length=120 --ignore=E501

      - name: Test DB read-only permissions
        working-directory: ./reports
        # Solo corre si hay una BD de test disponible (variable de entorno)
        if: env.DB_HOST != ''
        env:
          DB_HOST: ${{ secrets.TEST_DB_HOST }}
          DB_PORT: "5432"
          DB_NAME: ${{ secrets.TEST_DB_NAME }}
          DB_USER: ${{ secrets.TEST_DB_READONLY_USER }}
          DB_PASSWORD: ${{ secrets.TEST_DB_READONLY_PASSWORD }}
          APP_ENV: development
        run: |
          python -m pytest tests/test_db_readonly.py -v \
            --tb=short \
            -x  # parar en el primer fallo

      # ── ACTUALIZADO: tests con cobertura Python ────────────────────────────
      # pytest-cov genera htmlcov/ con reporte HTML
      # --cov-fail-under=0 permite pasar aunque no haya tests aún
      # Aumentar el número gradualmente: 0 → 30 → 60 → 80
      - name: Run tests with coverage
        working-directory: ./reports
        run: |
          pip install pytest pytest-cov
          python -m pytest tests/ \
            --cov=. \
            --cov-report=html:htmlcov \
            --cov-report=term-missing \
            --cov-fail-under=30 \
            --tb=short \
            2>/dev/null || echo "⚠️ Sin tests definidos en reports/tests/"

      - name: Upload coverage report — reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports-${{ github.sha }}
          path: reports/htmlcov/
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  # 5. ESCANEO DE SEGURIDAD CON TRIVY — LOS 3 SERVICIOS
  # ─────────────────────────────────────────────────────────────────────────────
  #
  # Escanea los 3 servicios y sube el SARIF de TODOS a GitHub Security tab.
  #
  # Por qué subir todos los SARIFs:
  #   - GitHub Security → Code scanning muestra alertas por servicio
  #   - Sin el SARIF de reports o frontend, sus vulnerabilidades no aparecen
  #   - Las categorías separan los resultados en la UI de GitHub
  # ────────────────────────────────────────────────────────────────────────────
  scan-prod-images:
    name: Trivy — Scan production images
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env

      - name: Build production images (los 3 servicios)
        run: |
          docker build -f backend/.docker/Dockerfile.prod backend/ -t nombre_del_proyecto/backend:scan
          docker build -f reports/.docker/Dockerfile.prod reports/ -t nombre_del_proyecto/reports:scan
          docker build \
            -f frontend/.docker/Dockerfile.prod \
            --build-arg NEXT_PUBLIC_API_URL=http://localhost:4000 \
            --build-arg NEXT_PUBLIC_REPORTS_URL=http://localhost:5000 \
            frontend/ \
            -t nombre_del_proyecto/frontend:scan

      - name: Scan backend image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: image
          image-ref: nombre_del_proyecto/backend:scan
          severity: CRITICAL,HIGH
          exit-code: '1'
          format: 'sarif'
          output: 'trivy-backend.sarif'

      - name: Scan reports image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: image
          image-ref: nombre_del_proyecto/reports:scan
          severity: CRITICAL,HIGH
          exit-code: '1'
          format: 'sarif'
          output: 'trivy-reports.sarif'

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: image
          image-ref: nombre_del_proyecto/frontend:scan
          severity: CRITICAL,HIGH
          exit-code: '1'
          format: 'sarif'
          output: 'trivy-frontend.sarif'

      # ── Upload SARIF de los 3 servicios a GitHub Security tab ────────────────
      - name: Upload SARIF — backend
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Upload SARIF — reports
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-reports.sarif
          category: trivy-reports

      - name: Upload SARIF — frontend
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend


  # ────────────────────────────────────────────────────────────────────────────
  # 6. SAST (Bandit para Python, Semgrep para TypeScript)
  # ─────────────────────────────────────────────────────────────────────────────
  sast-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Bandit (Python SAST)
        run: |
          pip install bandit
          bandit -r reports/src/ -ll -f json -o bandit-report.json || true
      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit -r reports/requirements.txt

  sast-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/typescript p/security-audit


  # ────────────────────────────────────────────────────────────────────────────
  # 7. TEST DE HARDENING: VERIFICAR READ-ONLY FILESYSTEM EN BACKEND Y FRONTEND
  # ─────────────────────────────────────────────────────────────────────────────
  test-readonly-filesystem:
    name: Test read-only filesystem hardening
    runs-on: ubuntu-latest
    needs: [build]  # Asegurarse de que las imágenes estén construidas
    steps:
      - uses: actions/checkout@v4
      
      - name: Start services (prod config)
        run: make prod-up  # Levantar con docker-compose.prod.yml
      
      - name: Wait for services to be healthy
        run: |
          timeout 120 bash -c 'until docker inspect nombre_del_proyecto_api --format="{{.State.Health.Status}}" | grep -q healthy; do sleep 3; done'
          timeout 120 bash -c 'until docker inspect nombre_del_proyecto_web --format="{{.State.Health.Status}}" | grep -q healthy; do sleep 3; done'
      
      - name: Verify read-only filesystem — Backend
        run: |
          # Intentar escribir — DEBE fallar con "Read-only file system"
          if docker exec nombre_del_proyecto_api sh -c "touch /app/test-write 2>&1" | grep -q "Read-only"; then
            echo "✅ Backend: filesystem es read-only"
          else
            echo "❌ Backend: filesystem NO es read-only — FALLO DE SEGURIDAD"
            exit 1
          fi
          
          # Verificar que /tmp sí es escribible (tmpfs)
          if docker exec nombre_del_proyecto_api sh -c "touch /tmp/test-write 2>&1" | grep -q "Read-only"; then
            echo "❌ Backend: /tmp no es escribible — error de configuración"
            exit 1
          else
            echo "✅ Backend: /tmp es escribible (tmpfs configurado)"
          fi
      
      - name: Verify read-only filesystem — Frontend
        run: |
          if docker exec nombre_del_proyecto_web sh -c "touch /app/test-write 2>&1" | grep -q "Read-only"; then
            echo "✅ Frontend: filesystem es read-only"
          else
            echo "❌ Frontend: filesystem NO es read-only — FALLO DE SEGURIDAD"
            exit 1
          fi
      
      - name: Verify no-new-privileges — Backend
        run: |
          # Intentar obtener privilegios — debe fallar
          if docker exec nombre_del_proyecto_api sh -c "sudo id 2>&1" | grep -q "not found\|Permission denied"; then
            echo "✅ Backend: no-new-privileges activo"
          fi
      
      - name: Cleanup
        if: always()
        run: make prod-down


