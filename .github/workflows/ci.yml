# filepath: .github/workflows/ci.yml
# ══════════════════════════════════════════════════════════════════════════════
# CI Pipeline — NOMBRE_DEL_PROYECTO
# Incluye: build, tests, SBOM con Syft, escaneo Trivy, upload de evidencia
# ══════════════════════════════════════════════════════════════════════════════
name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. VALIDACIÓN BASE
  # ────────────────────────────────────────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    env:
      BUILDKIT_PROGRESS: plain  # Solo para hacer la salida del build más legible en CI

    steps:
      - uses: actions/checkout@v4

      - name: Verificar archivos de configuración
        run: |
          test -f .env.example       || (echo "❌ .env.example faltante"   && exit 1)
          test -f docker-compose.yml || (echo "❌ docker-compose.yml faltante" && exit 1)
          test -f Makefile           || (echo "❌ Makefile faltante"           && exit 1)
          echo "✅ Archivos de configuración OK"

      - name: Validar Makefile (sintaxis)
        run: make --dry-run validate 2>&1 | head -20

      - name: Crear .env desde plantilla
        run: cp .env.example .env

      # validar pnpm install sin scripts postinstall (seguridad)
      - name: Verificar que .npmrc impone --ignore-scripts
        run: |
          # Verificar que el flag está en .npmrc de cada servicio
          for dir in backend frontend; do
            if ! grep -q "ignore-scripts=true" "$dir/.npmrc" 2>/dev/null; then
              echo "❌ $dir/.npmrc no tiene ignore-scripts=true"
              exit 1
            fi
          done
          echo "✅ ignore-scripts=true verificado en todos los servicios Node"

      # ── Validar variables de entorno ──────────────────────────────
      # Asegura que .env.example tiene todas las variables requeridas
      # antes de continuar con el build y los tests.
      - name: Validar variables de entorno
        run: |
          make validate-env
          echo "✅ Variables de entorno OK"

      - name: Validar docker-compose sintaxis
        run: |
          docker compose config > /dev/null
          echo "✅ docker-compose.yml válido"

      - name: Validar docker-compose.prod.yml
        run: |
          cp .env.prod.example .env.production
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config > /dev/null
          echo "✅ docker-compose.prod.yml válido"

      - uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('**/Dockerfile*') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ hashFiles('**/Dockerfile*') }}-
            ${{ runner.os }}-buildx-

      - name: Build Docker images
        run: docker compose build

      - name: Test servicios arrancan y son healthy
        run: |
          mkdir -p logs/backend logs/reports
          docker compose up -d

          MAX_WAIT=150
          INTERVAL=5
          ELAPSED=0

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            HEALTHY=$(docker ps --filter "health=healthy" --format '{{.Names}}')
            API=$(echo "$HEALTHY" | grep -c nombre_del_proyecto_api    || true)
            WEB=$(echo "$HEALTHY" | grep -c nombre_del_proyecto_web    || true)
            RPT=$(echo "$HEALTHY" | grep -c nombre_del_proyecto_reports || true)

            if [ "$API" -ge 1 ] && [ "$WEB" -ge 1 ] && [ "$RPT" -ge 1 ]; then
              echo "✅ Todos los servicios healthy (${ELAPSED}s)"
              break
            fi
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "❌ Timeout: servicios no healthy en ${MAX_WAIT}s"
            docker ps -a
            docker compose logs --tail=30
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: docker compose down -v

      
  # ────────────────────────────────────────────────────────────────────────────
  # 2. TYPE CHECKING — BACKEND, FRONTEND Y REPORTS
  # ────────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type checking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: |
            backend/pnpm-lock.yaml
            frontend/pnpm-lock.yaml

      - name: Install backend deps
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Type check backend
        working-directory: backend
        run: pnpm exec tsc --noEmit
        # ↑ Verifica tipos sin compilar — falla si hay errores de TypeScript

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Type check frontend
        working-directory: frontend
        run: pnpm exec tsc --noEmit
        # ↑ Verifica tipos sin compilar — falla si hay errores de TypeScript

  typecheck-python:
    name: Type check Python (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install mypy
        working-directory: reports
        run: pip install mypy types-Flask --break-system-packages
      - name: Run mypy
        working-directory: reports
        run: mypy src/ --ignore-missing-imports
        # ↑ Verifica tipos con mypy — falla si hay errores de tipado en Python

  # ────────────────────────────────────────────────────────────────────────────
  # 3. BUILD IMÁGENES DE PRODUCCIÓN + SBOM
  # ────────────────────────────────────────────────────────────────────────────
  build-prod-and-sbom:
    name: Build prod images + SBOM
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: cp .env.example .env

      # ── Build imágenes de producción ────────────────────────────────────────
      - name: Build Backend (prod)
        run: |
          docker build \
            -f backend/.docker/Dockerfile.prod \
            --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --build-arg GIT_SHA=${{ github.sha }} \
            --build-arg PROJECT_NAME=NOMBRE_DEL_PROYECTO \
            backend/ \
            -t nombre_del_proyecto/backend:${{ github.sha }} \
            -t nombre_del_proyecto/backend:latest

      - name: Build Frontend (prod)
        run: |
          docker build \
            -f frontend/.docker/Dockerfile.prod \
            --build-arg NEXT_PUBLIC_API_URL=http://localhost:4000 \
            --build-arg NEXT_PUBLIC_REPORTS_URL=http://localhost:5000 \
            --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --build-arg GIT_SHA=${{ github.sha }} \
            --build-arg PROJECT_NAME=NOMBRE_DEL_PROYECTO \
            frontend/ \
            -t nombre_del_proyecto/frontend:${{ github.sha }} \
            -t nombre_del_proyecto/frontend:latest

      - name: Build Reports (prod)
        run: |
          docker build \
            -f reports/.docker/Dockerfile.prod \
            --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --build-arg GIT_SHA=${{ github.sha }} \
            --build-arg PROJECT_NAME=NOMBRE_DEL_PROYECTO \
            reports/ \
            -t nombre_del_proyecto/reports:${{ github.sha }} \
            -t nombre_del_proyecto/reports:latest

      # ── SBOM con Syft ───────────────────────────────────────────────────────
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin
          echo "Syft version: $(syft --version)"

      - name: Generate SBOM — Backend
        run: |
          mkdir -p scripts/tests
          syft nombre_del_proyecto/backend:ci \
            -o cyclonedx-json=scripts/tests/sbom-backend.json \
            -o table
          echo "✅ SBOM backend generado"

      - name: Generate SBOM — Reports
        run: |
          syft nombre_del_proyecto/reports:ci \
            -o cyclonedx-json=scripts/tests/sbom-reports.json \
            -o table
          echo "✅ SBOM reports generado"

      - name: Generate SBOM — Frontend
        run: |
          syft nombre_del_proyecto/frontend:ci \
            -o cyclonedx-json=scripts/tests/sbom-frontend.json \
            -o table
          echo "✅ SBOM frontend generado"

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom-${{ github.sha }}
          path: scripts/tests/sbom-*.json
          retention-days: 90

      # ── Build con metadatos OCI (descomentar cuando registry esté configurado) ──
      # - name: Build backend con metadatos
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: ./backend
      #     file: ./backend/.docker/Dockerfile.prod
      #     push: false   # cambiar a true cuando el registry esté configurado
      #     tags: ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
      #     build-args: |
      #       BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
      #       GIT_SHA=${{ github.sha }}
      #       PROJECT_NAME=NOMBRE_DEL_PROYECTO
      # Requiere descomentar en los Dockerfiles:
      #   ARG BUILD_DATE
      #   ARG GIT_SHA
      #   LABEL org.opencontainers.image.created="${BUILD_DATE}"
      #   LABEL org.opencontainers.image.revision="${GIT_SHA}"

      # - name: Build frontend con metadatos
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: ./frontend
      #     file: ./frontend/.docker/Dockerfile.prod
      #     push: false
      #     tags: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
      #     build-args: |
      #       BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
      #       GIT_SHA=${{ github.sha }}
      #       NEXT_PUBLIC_API_URL=http://localhost:4000
      #       NEXT_PUBLIC_REPORTS_URL=http://localhost:5000
      #
      # - name: Build reports con metadatos
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: ./reports
      #     file: ./reports/.docker/Dockerfile.prod
      #     push: false
      #     tags: ghcr.io/${{ github.repository }}/reports:${{ github.sha }}
      #     build-args: |
      #       BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
      #       GIT_SHA=${{ github.sha }}

  # Firmar las imágenes con Cosign (descomentar cuando esté configurado el registry y se hayan subido las imágenes)
  # sign-images:
  #   needs: build-prod-and-sbom
  #   runs-on: ubuntu-latest
  #   steps:
